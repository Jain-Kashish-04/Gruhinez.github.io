	<style>
		body{
		background:#e7dcc8;
		font-family:Georgia, serif;
		}

		/* NAVBAR */

		.navbar-custom{
		display:flex;
		justify-content:space-between;
		align-items:center;
		padding:15px 30px;
		position:fixed;
		top:0;
		left:0;
		width:100%;
		background:#e7dcc8;
		z-index:1000;
		}

		.icon{
		font-size:28px;
		color:#6fab68;
		}

		/* SEARCH BAR */

		.search-box{
		background:#6fab68;
		width:50%;
		search-box
		border-radius:100%;
		padding:12px 20px;
		border:none;
		color:white;
		box-shadow:0 6px 10px rgba(0,0,0,0.2);
		font-size:18px;
		}

		.search-box::placeholder{
		color:#e8e8e8;
		}

		/* SECTION TITLE */

		.section-title{
		text-align:center;
		font-size:40px;
		color:#7a5520;
		margin:40px 0;
		height:90px;
		}

		/* CATEGORY CARDS */

		.category-card{
		background:#6fab68;
		border-radius:20px;
		padding:15px;
		text-align:center;
		box-shadow:0 8px 15px rgba(0,0,0,0.2);
		transition:0.4s;
		border:2px solid #7a5520;
		}

		.category-card:hover{
		transform:translateY(-8px) scale(1.05);
		}

		.category-card img{
		width:100%;
		height:150px;
		object-fit:cover;
		border-radius:15px;
		}

		.category-card p{
		margin-top:10px;
		color:#f4a261;
		font-weight:bold;
		}

		/* RECENTLY VIEWED */

		.recent-section{
		padding:30px;
		}

		.recent-title{
			font-size:40px;
			color:#7a5520;
			margin-bottom:20px;
		}

		/* horizontal slider */

		.scroll-container{
		display:flex;
		gap:25px;
		overflow-x:auto;
		scroll-behavior:smooth;
		padding-bottom:10px;
		}

		.scroll-container::-webkit-scrollbar{
			display:none;
		}

		.product-card{
		min-width:220px;
		border:1px solid ;
		background-color:#6fab68;
		border-radius:25px;
		padding:15px;
		color:white;
		transition:0.4s;
		border:2px solid #7a5520;
		}

		.product-card:hover{
		transform:scale(1.05);
		}

		.product-card img{
			width:100%;
			height:130px;
			object-fit:cover;
			border-radius:15px;
			margin-bottom:10px;
		}

		.price{
		color:#7a5520;
		font-size:20px;
		}

		/* OFFERS */

		.offer-section{
		background:#5e8c3a;
		margin:40px;
		padding:40px;
		border-radius:25px;
		}

		.offer-title{
		font-size:40px;
		color:#f4a261;
		margin-bottom:20px;
		}

		.offer-slider{
		display:flex;
		gap:30px;
		overflow-x:auto;
		}

		.offer-box{
		min-width:400px;
		height:200px;
		background:#d9d9d9;
		border-radius:40px;
		}
	</style>
